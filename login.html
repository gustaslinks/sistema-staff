<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Staff</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
  <div class="login-card">

    <h1>Área do Staff</h1>

    <p class="subtitle">
      Entre utilizando CPF e data de nascimento.
    </p>

    <form id="loginForm" novalidate>

      <div class="field">
        <label for="cpf">CPF</label>

        <input
          type="text"
          id="cpf"
          placeholder="000.000.000-00"
          maxlength="14"
          inputmode="numeric"
          required
        >

        <div class="error" id="cpfError">
          CPF inválido.
        </div>
      </div>

      <div class="field">
        <label for="nascimento">Data de nascimento</label>

        <input
          type="date"
          id="nascimento"
          required
        >

        <div class="error" id="nascimentoError">
          Informe sua data de nascimento.
        </div>
      </div>

      <button type="submit" id="loginBtn">
        Entrar
      </button>

    </form>

    <div class="result hidden" id="resultadoLogin">

      <div class="staff-card">

        <img id="staffFoto" src="" alt="Foto staff">

        <div class="staff-info">
          <h2 id="staffNome"></h2>

          <p id="staffCidade"></p>

          <p id="staffTelefone"></p>

          <p id="staffEmail"></p>
        </div>

      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js"></script>

</body>
</html>
