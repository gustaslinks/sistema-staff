<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Staff</title>
  <link rel="stylesheet" href="style.css?v=200">
</head>
<body class="login-page">
  <div class="version-badge">v200</div>
  <div class="container">
    <div class="login-card">
      <h1>Área do Staff</h1>
      <p class="subtitle">Entre com seu e-mail e senha cadastrados.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="loginEmail">E-mail</label>
          <input type="email" id="loginEmail" placeholder="seuemail@email.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" placeholder="Digite sua senha" autocomplete="current-password" required>
        </div>

        <button type="submit" id="loginBtn">Entrar</button>
      </form>

      <a class="cadastro-link" href="cadastro.html">Ainda não tenho cadastro</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js?v=200"></script>
</body>
</html>
