<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Staff</title>
  <link rel="stylesheet" href="css/style.css?v=194">
</head>
<body class="login-page">
  <div class="version-badge">v194</div>
  <div class="container">
    <div class="login-card">
      <h1>Área do Staff</h1>
      <p class="subtitle">Entre utilizando CPF e data de nascimento.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
        </div>

        <div class="field">
          <label for="nascimento">Data de nascimento</label>
          <input type="text" id="nascimento" placeholder="dd/mm/aaaa" maxlength="10" inputmode="numeric" required>
        </div>

        <div class="field hidden" id="adminPasswordField">
          <label for="adminPassword">Senha Admin</label>
          <input type="password" id="adminPassword" placeholder="Digite sua senha">
        </div>

        <button type="submit" id="loginBtn">Entrar</button>
      </form>

      <a class="cadastro-link" href="cadastro.html">Ainda não tenho cadastro</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/login.js?v=194"></script>
</body>
</html>
