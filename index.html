<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Staff</title>
  <link rel="stylesheet" href="style.css?v=25">
</head>
<body class="login-page">
  <button class="version-badge" type="button" data-version-summary="v2.5: logout do administrador corrigido; login por CPF ou e-mail; opção manter conectado; botões do login reorganizados; seleção de todos os dias na disponibilidade; campo PCD no cadastro; upload de foto reorganizado; avisos da disponibilidade e status de inscrições refinados.">v2.5</button>
  <div class="container">
    <div class="login-card">
      <h1>Área do Staff</h1>
      <p class="subtitle">Entre com seu CPF e senha cadastrados.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="loginCpf">CPF ou e-mail</label>
          <input type="text" id="loginCpf" placeholder="Digite seu CPF ou e-mail" maxlength="120" inputmode="email" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="loginPassword">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Digite sua senha" autocomplete="current-password" required>
            <button class="password-toggle" type="button" data-toggle-password="loginPassword" aria-label="Mostrar senha"><span class="password-icon password-icon-eye" aria-hidden="true"></span></button>
          </div>
        </div>

        <label class="keep-connected-option"><input type="checkbox" id="keepConnected" checked> <span>Manter-me conectado</span></label>

        <div id="loginStatus" class="login-status" aria-live="polite"></div>

        <button type="submit" id="loginBtn">Entrar</button>
        <div class="login-secondary-actions">
          <button type="button" id="forgotPasswordBtn" class="forgot-password-btn">Esqueci minha senha</button>
          <a class="cadastro-link" href="cadastro.html">Ainda não tenho cadastro</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js?v=25"></script>

<script>
(function(){
  function openVersionInfo(){
    var badge=document.querySelector('.version-badge');
    if(!badge) return;
    var text=badge.getAttribute('data-version-summary') || badge.getAttribute('title') || badge.textContent;
    var old=document.querySelector('.version-popover');
    if(old){ old.remove(); return; }
    var box=document.createElement('div');
    box.className='version-popover';
    box.innerHTML='<button type="button" class="version-popover-close" aria-label="Fechar">×</button><strong>'+badge.textContent+'</strong><p>'+text+'</p>';
    document.body.appendChild(box);
    box.querySelector('.version-popover-close').addEventListener('click', function(e){ e.stopPropagation(); box.remove(); });
    setTimeout(function(){
      document.addEventListener('click', function close(ev){
        if(!box.contains(ev.target) && ev.target!==badge){ box.remove(); document.removeEventListener('click', close); }
      });
    },0);
  }
  document.addEventListener('DOMContentLoaded', function(){
    var badge=document.querySelector('.version-badge');
    if(!badge) return;
    badge.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); openVersionInfo(); });
    badge.addEventListener('touchend', function(e){ e.preventDefault(); e.stopPropagation(); openVersionInfo(); }, {passive:false});
  });
})();
</script>
</body>
</html>
