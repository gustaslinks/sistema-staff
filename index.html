<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Staff</title>
  <link rel="stylesheet" href="style.css?v=22">
</head>
<body class="login-page">
  <div class="version-badge" title="v2.2: corrige logout/sessão persistente; moderniza página de corridas; melhora cards, banners, títulos, disponibilidade, alertas e checkboxes." aria-label="v2.2: corrige logout/sessão persistente; moderniza página de corridas; melhora cards, banners, títulos, disponibilidade, alertas e checkboxes.">v2.2</div>
  <div class="container">
    <div class="login-card">
      <h1>Área do Staff</h1>
      <p class="subtitle">Entre com seu CPF e senha cadastrados.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="loginCpf">CPF</label>
          <input type="text" id="loginCpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="loginPassword">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Digite sua senha" autocomplete="current-password" required>
            <button class="password-toggle" type="button" data-toggle-password="loginPassword" aria-label="Mostrar senha">👁️</button>
          </div>
        </div>

        <div id="loginStatus" class="login-status" aria-live="polite"></div>

        <button type="submit" id="loginBtn">Entrar</button>
        <button type="button" id="forgotPasswordBtn" class="forgot-password-btn">Esqueci minha senha</button>
      </form>

      <a class="cadastro-link" href="cadastro.html">Ainda não tenho cadastro</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js?v=22"></script>
</body>
</html>
