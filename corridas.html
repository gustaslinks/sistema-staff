<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Corridas disponíveis | Sistema Staff</title>

  <link rel="stylesheet" href="style.css?v=160">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="version-badge">v160</div>

  <main class="pagina-corridas">

    <section id="card-staff" class="card-staff">
      <div class="foto-staff-wrapper">
        <img id="foto-staff" class="foto-staff" src="" alt="Foto do staff">
      </div>

      <div class="dados-staff">
        <p class="label-card">Você está logado como</p>
        <h2 id="nome-staff"></h2>
        <p id="cidade-staff"></p>
        <p id="email-staff"></p>
      </div>

<div class="acoes-staff admin-card-acoes-logado">
  <button id="botao-admin" class="admin-card-acao admin-card-acao-corridas hidden" type="button">
    Painel Admin
  </button>

  <button id="botao-editar-cadastro" class="admin-card-acao admin-card-acao-perfil" type="button">
    Editar cadastro
  </button>

  <button id="botao-sair" class="admin-card-acao admin-card-acao-sair logout-btn" type="button">
    Sair
  </button>
</div>
    </section>

    <section class="cabecalho-corridas">
      <h1>Corridas disponíveis</h1>
      <p>Escolha uma corrida para realizar sua inscrição.</p>
    </section>

    <section id="lista-corridas" class="lista-corridas">
      <p>Carregando corridas...</p>
    </section>

    <section class="secao-minhas-inscricoes">
      <div class="cabecalho-corridas">
        <h2>Minhas inscrições</h2>
        <p>Acompanhe as corridas em que você já se inscreveu.</p>
      </div>

      <section id="lista-minhas-inscricoes" class="lista-minhas-inscricoes">
        <p>Carregando suas inscrições...</p>
      </section>
    </section>

  </main>

  <script src="corridas.js?v=160"></script>
  <script src="floating-tools.js?v=160"></script>
</body>
</html>
