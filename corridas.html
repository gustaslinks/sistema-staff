<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Corridas disponíveis | Sistema Staff</title>

  <link rel="stylesheet" href="style.css?v=40">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="body-corridas">
  <button class="version-badge" type="button" data-version-summary="v4.0: dashboard de check-in com QR expansível, relatório compacto, badges operacionais e layout de corridas simplificado.">v4.0</button>

  <main class="pagina-corridas">

    <section id="card-staff" class="card-staff">
      <div class="foto-staff-wrapper">
        <img id="foto-staff" class="foto-staff" src="" alt="Foto do staff">
      </div>

      <div class="dados-staff">
        <p class="label-card">Você está logado como</p>
        <h2 id="nome-staff"></h2>
        <p id="cidade-staff"></p>
        <p id="email-staff"></p>
      </div>

<div class="acoes-staff admin-card-acoes-logado">
  <button id="botao-admin" class="admin-card-acao admin-card-acao-corridas hidden" type="button">
    Painel Admin
  </button>

  <button id="botao-editar-cadastro" class="admin-card-acao admin-card-acao-perfil" type="button">
    Editar cadastro
  </button>

  <button id="botao-sair" class="admin-card-acao admin-card-acao-sair logout-btn" type="button">
    Sair
  </button>
</div>
    </section>

    <section class="cabecalho-corridas">
      <h1>Corridas disponíveis</h1>
      <p>Escolha uma corrida para realizar sua inscrição.</p>
    </section>

    <section id="lista-corridas" class="lista-corridas">
      <p>Carregando corridas...</p>
    </section>

    <section class="secao-minhas-inscricoes">
      <div class="cabecalho-corridas">
        <h2>Minhas inscrições</h2>
        <p>Acompanhe as corridas em que você já se inscreveu.</p>
      </div>

      <section id="lista-minhas-inscricoes" class="lista-minhas-inscricoes">
        <p>Carregando suas inscrições...</p>
      </section>
    </section>

  </main>

  <script src="corridas.js?v=40"></script>
  <script src="floating-tools.js?v=33"></script>

<script>
(function(){
  function openVersionInfo(){
    var badge=document.querySelector('.version-badge');
    if(!badge) return;
    var text=badge.getAttribute('data-version-summary') || badge.getAttribute('title') || badge.textContent;
    var old=document.querySelector('.version-popover');
    if(old){ old.remove(); return; }
    var box=document.createElement('div');
    box.className='version-popover';
    box.innerHTML='<button type="button" class="version-popover-close" aria-label="Fechar">×</button><strong>'+badge.textContent+'</strong><p>'+text+'</p>';
    document.body.appendChild(box);
    box.querySelector('.version-popover-close').addEventListener('click', function(e){ e.stopPropagation(); box.remove(); });
    setTimeout(function(){
      document.addEventListener('click', function close(ev){
        if(!box.contains(ev.target) && ev.target!==badge){ box.remove(); document.removeEventListener('click', close); }
      });
    },0);
  }
  document.addEventListener('DOMContentLoaded', function(){
    var badge=document.querySelector('.version-badge');
    if(!badge) return;
    badge.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); openVersionInfo(); });
    badge.addEventListener('touchend', function(e){ e.preventDefault(); e.stopPropagation(); openVersionInfo(); }, {passive:false});
  });
})();
</script>
</body>
</html>
