<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar senha | Sistema Staff</title>
  <link rel="stylesheet" href="style.css?v=22">
</head>
<body class="login-page">
  <div class="version-badge" title="v2.2: corrige logout/sessão persistente; moderniza página de corridas; melhora cards, banners, títulos, disponibilidade, alertas e checkboxes." aria-label="v2.2: corrige logout/sessão persistente; moderniza página de corridas; melhora cards, banners, títulos, disponibilidade, alertas e checkboxes.">v2.2</div>
  <div class="container">
    <div class="login-card">
      <h1>Alterar senha</h1>
      <p class="subtitle">Digite a nova senha para sua conta.</p>

      <form id="resetPasswordForm" novalidate>
        <div class="field">
          <label for="newPassword">Nova senha</label>
          <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
            <button class="password-toggle" type="button" data-toggle-password="newPassword" aria-label="Mostrar senha">👁️</button>
          </div>
        </div>

        <div class="field">
          <label for="newPasswordConfirm">Confirmar nova senha</label>
          <div class="password-wrapper">
            <input type="password" id="newPasswordConfirm" placeholder="Repita a nova senha" autocomplete="new-password" minlength="6" required>
            <button class="password-toggle" type="button" data-toggle-password="newPasswordConfirm" aria-label="Mostrar senha">👁️</button>
          </div>
        </div>

        <div id="resetStatus" class="login-status" aria-live="polite"></div>
        <button type="submit" id="resetPasswordBtn">Salvar nova senha</button>
      </form>

      <a class="cadastro-link" href="index.html">Voltar para o login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="alterar-senha.js?v=22"></script>
</body>
</html>
