<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar senha | Sistema Staff</title>
  <link rel="stylesheet" href="style.css?v=33">
</head>
<body class="login-page">
  <button class="version-badge" type="button" data-version-summary="v3.3: cola banner no topo dos cards, remove Dados de acesso no modo edição, separa Segurança e acesso e mantém e-mail travado para staff comum.">v3.3</button>
  <div class="container">
    <div class="login-card">
      <h1>Alterar senha</h1>
      <p class="subtitle">Digite a nova senha para sua conta.</p>

      <form id="resetPasswordForm" novalidate>
        <div class="field">
          <label for="newPassword">Nova senha</label>
          <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
            <button class="password-toggle" type="button" data-toggle-password="newPassword" aria-label="Mostrar senha"><span class="password-icon password-icon-eye" aria-hidden="true"></span></button>
          </div>
        </div>

        <div class="field">
          <label for="newPasswordConfirm">Confirmar nova senha</label>
          <div class="password-wrapper">
            <input type="password" id="newPasswordConfirm" placeholder="Repita a nova senha" autocomplete="new-password" minlength="6" required>
            <button class="password-toggle" type="button" data-toggle-password="newPasswordConfirm" aria-label="Mostrar senha"><span class="password-icon password-icon-eye" aria-hidden="true"></span></button>
          </div>
        </div>

        <div id="resetStatus" class="login-status" aria-live="polite"></div>
        <button type="submit" id="resetPasswordBtn">Salvar nova senha</button>
      </form>

      <a class="cadastro-link" href="index.html">Voltar para o login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="alterar-senha.js?v=33"></script>

<script>
(function(){
  function openVersionInfo(){
    var badge=document.querySelector('.version-badge');
    if(!badge) return;
    var text=badge.getAttribute('data-version-summary') || badge.getAttribute('title') || badge.textContent;
    var old=document.querySelector('.version-popover');
    if(old){ old.remove(); return; }
    var box=document.createElement('div');
    box.className='version-popover';
    box.innerHTML='<button type="button" class="version-popover-close" aria-label="Fechar">×</button><strong>'+badge.textContent+'</strong><p>'+text+'</p>';
    document.body.appendChild(box);
    box.querySelector('.version-popover-close').addEventListener('click', function(e){ e.stopPropagation(); box.remove(); });
    setTimeout(function(){
      document.addEventListener('click', function close(ev){
        if(!box.contains(ev.target) && ev.target!==badge){ box.remove(); document.removeEventListener('click', close); }
      });
    },0);
  }
  document.addEventListener('DOMContentLoaded', function(){
    var badge=document.querySelector('.version-badge');
    if(!badge) return;
    badge.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); openVersionInfo(); });
    badge.addEventListener('touchend', function(e){ e.preventDefault(); e.stopPropagation(); openVersionInfo(); }, {passive:false});
  });
})();
</script>
</body>
</html>
