<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Painel Admin | Sistema Staff</title>

  <link rel="stylesheet" href="style.css?v=183">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="version-badge">v183</div>

  <main class="pagina-admin">

    <section id="card-staff" class="card-staff">

  <div class="foto-staff-wrapper">
    <img id="foto-staff" class="foto-staff" src="" alt="Foto do staff">
  </div>

  <div class="dados-staff">
    <p class="label-card">Administrador logado</p>

    <h2 id="nome-staff"></h2>

    <p id="cidade-staff"></p>

    <p id="email-staff"></p>
  </div>

  <div class="admin-card-acoes-logado">
    <button id="abrir-corridas-btn" class="admin-card-acao admin-card-acao-corridas" type="button">
      Corridas
    </button>

    <button id="editarPerfilAdminBtn" class="admin-card-acao admin-card-acao-perfil" type="button">
      Editar cadastro
    </button>

    <button id="logoutBtn" class="admin-card-acao admin-card-acao-sair logout-btn" type="button">
      Sair
    </button>
  </div>

</section>

    <section class="cabecalho-corridas admin-hero-gerenciamento">
      <div class="admin-hero-texto">
        <p class="admin-eyebrow">Painel admin</p>
        <h1>Gerenciamento de Corridas</h1>
        <p>Crie, acompanhe e gerencie inscrições.</p>
      </div>

      <button id="nova-corrida-btn" class="submit-btn btn-admin admin-hero-btn">
        + Nova corrida
      </button>
    </section>

    <section id="form-nova-corrida" class="form-admin hidden">

      <div class="form-area">

        <h2 class="section-title">
          Cadastro de corrida
        </h2>

        <div class="grid grid-cadastro-corrida">

          <div class="field">
            <label for="corrida-nome">Nome da corrida</label>
            <input type="text" id="corrida-nome">
          </div>

          <div class="field">
            <label for="corrida-data-inicio">Início do evento / entrega de kit</label>
            <input type="date" id="corrida-data-inicio">
          </div>

          <div class="field">
            <label for="corrida-data-fim">Data da corrida / fim do evento</label>
            <input type="date" id="corrida-data-fim">
          </div>

          <div class="field">
            <label for="corrida-prazo">Prazo de inscrição</label>
            <input type="date" id="corrida-prazo">
          </div>

          <div class="field">
            <label for="corrida-vagas">Número de vagas</label>
            <input type="number" id="corrida-vagas" min="1" placeholder="Ex.: 30">
          </div>

          <div class="field field-checkbox-admin">
            <label class="checkbox-admin-card">
              <input type="checkbox" id="corrida-patrocinador-tenis">
              <span>
                <strong>Corrida com patrocinador de tênis</strong>
                <small>Habilita relatórios de numeração para entrega de tênis aos staffs.</small>
              </span>
            </label>
          </div>

          <div class="field field-banner-corrida">
            <label for="corrida-banner">Banner da corrida <span class="label-opcional">(opcional)</span></label>
            <input type="file" id="corrida-banner" accept="image/jpeg,image/png,image/webp">
            <small>Formato recomendado: 16:9, 1200×675 px, JPG/PNG/WebP até 1 MB.</small>
            <div id="corrida-banner-preview" class="corrida-banner-preview hidden"></div>
            <button id="remover-banner-corrida" class="botao-admin-secundario botao-remover-banner hidden" type="button">Remover banner</button>
          </div>

        </div>

        <div class="field field-spaced">
          <label for="corrida-local">Local completo</label>
          <textarea id="corrida-local" rows="4" placeholder="Nome do local, endereço completo, portão/acesso e ponto de referência"></textarea>
        </div>

        <div class="field">
          <label>Observações</label>
          <textarea id="corrida-observacoes" rows="3">Traje obrigatório: calça jeans ou preta. Não levar mochila grande. Levar documento com foto e chegar com antecedência ao local informado.</textarea>
        </div>

        <h2 class="section-title">
          Cadastro de dias da corrida
        </h2>

        <button id="toggle-novo-dia-btn" class="botao-admin-secundario botao-toggle-novo-dia hidden" type="button">
          + Cadastrar novo dia
        </button>

        <div id="novo-dia-form-bloco" class="novo-dia-form-bloco">
          <div class="grid">

            <div class="field">
              <label>Tipo do período</label>
              <select id="novo-dia-tipo">
                <option value="Entrega de kit">Entrega de kit</option>
                <option value="Corrida">Dia da corrida</option>
              </select>
            </div>

            <div class="field">
              <label>Ajuda de custo do período</label>
              <input type="number" id="novo-dia-ajuda" min="0" step="0.01" placeholder="Ex.: 120">
            </div>

            <div class="field">
              <label>Data inicial</label>
              <input type="date" id="novo-dia-inicio">
            </div>

            <div class="field">
              <label>Data final <span class="label-opcional">(opcional)</span></label>
              <input type="date" id="novo-dia-fim">
            </div>

            <div class="field">
              <label>Horário início</label>
              <input type="time" id="novo-dia-horario-inicio">
            </div>

            <div class="field">
              <label>Horário fim <span class="label-opcional">(opcional)</span></label>
              <input type="time" id="novo-dia-horario-fim">
            </div>

            <div class="field field-checkbox-admin field-ate-ultimo">
              <label class="checkbox-admin-card checkbox-admin-card-compacto">
                <input type="checkbox" id="novo-dia-ate-ultimo">
                <span>
                  <strong>Até o último atleta chegar</strong>
                  <small>Desativa o horário final fixo deste período.</small>
                </span>
              </label>
            </div>

          </div>

          <button id="adicionar-periodo-btn" class="botao-admin-secundario" type="button">
            Adicionar período
          </button>
        </div>

        <div id="preview-dias-corrida" class="preview-dias-corrida">
          <p>Nenhum dia adicionado ainda.</p>
        </div>

        <button id="salvar-corrida-btn" class="submit-btn">
          Salvar corrida
        </button>

      </div>

    </section>

    <section class="secao-corridas-admin">

      <section id="lista-corridas-admin" class="lista-corridas">
        <p>Carregando corridas...</p>
      </section>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="qrcode.min.js?v=183"></script>
  <script src="admin.js?v=183"></script>
  <script src="floating-tools.js?v=183"></script>
</body>
</html>
